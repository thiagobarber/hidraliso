<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página com Cookies</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      min-height: calc(100 * min(var(--vh, 1vh), 1vh));

      /* IMAGEM DE FUNDO */
      background: url('https://i.imgur.com/5Vb55M9.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .modal-backdrop {
      background: rgba(0,0,0,0.55);
      min-height: calc(100 * min(var(--vh, 1vh), 1vh));
      backdrop-filter: blur(2px);
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
</head>

<body data-template-id="__page-root" class="w-full">

  <div id="cookie-modal" class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4">

    <div data-template-id="modal-box"
      class="canva-card relative rounded-2xl shadow-2xl max-w-md w-full p-6 sm:p-8 bg-white">

      <button id="close-btn"
        class="absolute top-3 right-3 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-200 transition"
        aria-label="Fechar">

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>

      </button>

      <div class="text-center mb-2 text-4xl">
        
      </div>

      <h2 data-template-id="modal-title"
        class="canva-text text-center font-bold mb-2 text-gray-900"
        style="font-size:22px">

        Política de Cookies

      </h2>

      <p data-template-id="modal-desc"
        class="canva-text text-center mb-6 text-gray-600"
        style="font-size:15px">

        Utilizamos cookies para melhorar sua experiência de navegação.
        Ao continuar, você concorda com nossa política de cookies.

      </p>

      <div class="flex flex-col sm:flex-row gap-3">

        <button id="accept-btn"
          data-template-id="accept-button"
          class="canva-button flex-1 py-3 px-4 rounded-xl font-semibold transition hover:opacity-90 text-white"
          style="background:#7c3aed">

          Aceitar

        </button>

        <button id="reject-btn"
          data-template-id="reject-button"
          class="canva-button flex-1 py-3 px-4 rounded-xl font-semibold transition hover:opacity-90 text-gray-700"
          style="background:#e5e7eb">

          Não Aceitar

        </button>

      </div>
    </div>
  </div>

  <script src="/_sdk/editing_sdk.js"></script>

  <script>
    const link = 'https://app.monetizze.com.br/r/BXL1891010';

    function go() {
      window.open(link, '_blank', 'noopener,noreferrer');
      document.getElementById('cookie-modal').classList.add('hidden');
    }

    document.getElementById('accept-btn').addEventListener('click', go);
    document.getElementById('reject-btn').addEventListener('click', go);
    document.getElementById('close-btn').addEventListener('click', go);
  </script>

</body>
</html>
</html>
