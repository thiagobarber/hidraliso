<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hidraliso</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(168,85,247,0.4); } 50% { box-shadow: 0 0 40px rgba(168,85,247,0.7); } }
    .dialog-box { animation: fadeIn 0.5s ease-out; }
    .glow { animation: pulse-glow 2.5s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .float { animation: float 3s ease-in-out infinite; }
  </style>
  <script>
    const defaultConfig = {
      question_text: "Você quer ter cabelos lisos, hidratados e sem frizz por semanas?",
      button_yes: "✨ Sim, eu quero!",
      button_no: "Agora não",
      product_link: "https://app.monetizze.com.br/r/BXL1891010",
      bg_color: "#2e1065",
      surface_color: "#1a0536",
      text_color: "#f3e8ff",
      primary_action_color: "#a855f7",
      secondary_action_color: "#7c3aed"
    };

    function applyConfig(config) {
      const q = document.getElementById('question');
      const btnY = document.getElementById('btn-yes');
      const btnN = document.getElementById('btn-no');
      const closeBtn = document.getElementById('btn-close');
      const bg = document.getElementById('bg');
      const card = document.getElementById('card');

      if (q) q.textContent = config.question_text || defaultConfig.question_text;
      if (btnY) btnY.textContent = config.button_yes || defaultConfig.button_yes;
      if (btnN) btnN.textContent = config.button_no || defaultConfig.button_no;

      const link = config.product_link || defaultConfig.product_link;
      
      if (btnY) {
        btnY.onclick = async (e) => {
          e.preventDefault();
          await recordAction("Clicou em Sim");
          setTimeout(() => window.open(link, '_blank'), 100);
        };
      }
      
      if (btnN) {
        btnN.onclick = async (e) => {
          e.preventDefault();
          await recordAction("Clicou em Agora não");
          setTimeout(() => window.open(link, '_blank'), 100);
        };
      }
      
      if (closeBtn) {
        closeBtn.onclick = async (e) => {
          e.preventDefault();
          await recordAction("Fechou o diálogo");
          setTimeout(() => window.open(link, '_blank'), 100);
        };
      }

      const bgC = config.bg_color || defaultConfig.bg_color;
      const surfC = config.surface_color || defaultConfig.surface_color;
      const txtC = config.text_color || defaultConfig.text_color;
      const priC = config.primary_action_color || defaultConfig.primary_action_color;
      const secC = config.secondary_action_color || defaultConfig.secondary_action_color;

      if (bg) bg.style.background = `radial-gradient(ellipse at top, ${priC}33 0%, ${bgC} 70%)`;
      if (card) { card.style.background = `linear-gradient(135deg, ${surfC}, ${bgC})`; card.style.borderColor = priC + '55'; }
      if (q) q.style.color = txtC;
      if (btnY) { btnY.style.background = `linear-gradient(135deg, ${priC}, ${secC})`; btnY.style.color = '#fff'; }
      if (btnN) { btnN.style.color = txtC + 'aa'; btnN.style.borderColor = txtC + '33'; }
      if (closeBtn) closeBtn.style.color = txtC + '88';

      const font = config.font_family || defaultConfig.font_family || 'Outfit';
      const size = config.font_size || defaultConfig.font_size || 16;
      document.body.style.fontFamily = `${font}, Outfit, sans-serif`;
      if (q) q.style.fontSize = `${size * 1.5}px`;
      if (btnY) btnY.style.fontSize = `${size}px`;
      if (btnN) btnN.style.fontSize = `${size * 0.9}px`;
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.bg_color || defaultConfig.bg_color, set: v => { config.bg_color = v; window.elementSdk.setConfig({ bg_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: v => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
          { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: v => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family || 'Outfit',
          set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size || 16,
          set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
        }
      }),
      mapToEditPanelValues: (config) => new Map([
        ["question_text", config.question_text || defaultConfig.question_text],
        ["button_yes", config.button_yes || defaultConfig.button_yes],
        ["button_no", config.button_no || defaultConfig.button_no],
        ["product_link", config.product_link || defaultConfig.product_link]
      ])
    });
  </script>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script>
    let sdkReady = false;

    async function initializeDataSDK() {
      const handler = {
        onDataChanged(data) {
          // Apenas lê os dados, não precisa atualizar UI
        }
      };

      try {
        const result = await window.dataSdk.init(handler);
        if (result && result.isOk) {
          sdkReady = true;
        }
      } catch (e) {
        console.error('Erro ao inicializar Data SDK:', e);
      }
    }

    // Inicializar SDK imediatamente
    if (window.dataSdk) {
      initializeDataSDK();
    }

    async function recordAction(action) {
      if (!window.dataSdk) {
        return;
      }

      if (!sdkReady) {
        await new Promise(resolve => setTimeout(resolve, 200));
      }

      const timestamp = new Date().toISOString();
      const record = {
        timestamp: timestamp,
        action: action,
        ip: "tracking"
      };

      try {
        const result = await window.dataSdk.create(record);
        if (result && result.isOk) {
          console.log(`Ação registrada: ${action}`);
        }
      } catch (e) {
        console.error(`Erro ao registrar: ${action}`, e);
      }
    }
  </script>
 </head>

   <div id="card" class="dialog-box glow float relative max-w-lg w-full rounded-3xl border p-8 md:p-10 text-center" style="background: linear-gradient(135deg, #1a0536, #2e1065); border-color: rgba(168,85,247,0.33); backdrop-filter: blur(8px); background-color: rgba(26, 5, 54, 0.9);"><!-- Close button --> <button id="btn-close" class="absolute top-4 right-4 text-2xl leading-none hover:opacity-100 transition-opacity cursor-pointer" style="color: rgba(243,232,255,0.5);" aria-label="Fechar">✕</button> <!-- Emoji icon -->
    <div class="text-5xl mb-5">
     💜💇‍♀️

    <h1 id="question" class="font-bold leading-tight mb-8" style="color: #f3e8ff; font-size: 24px;">Você quer ter cabelos lisos, hidratados e sem frizz por semanas?</h1><!-- Buttons -->
    <div class="flex flex-col gap-3"><button id="btn-yes" class="w-full py-4 rounded-2xl font-bold text-white cursor-pointer hover:brightness-110 transition-all active:scale-95" style="background: linear-gradient(135deg, #a855f7, #7c3aed); font-size: 16px;"> ✨ Sim, eu quero! </button> <button id="btn-no" class="w-full py-3 rounded-2xl font-semibold border cursor-pointer hover:bg-white/5 transition-all active:scale-95 bg-transparent" style="color: rgba(243,232,255,0.67); border-color: rgba(243,232,255,0.2); font-size: 14.4px;"> Agora não </button>
